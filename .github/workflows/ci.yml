name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: pytest tests -q

      - name: Run Ruff
        run: ruff check src tests

      - name: Run mypy
        run: mypy src tests

      - name: Run compile check
        run: PYTHONPYCACHEPREFIX=.cache/pyc python -m compileall src tests
